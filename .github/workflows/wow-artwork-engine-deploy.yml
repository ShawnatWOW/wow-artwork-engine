name: WOW Artwork Engine Deploy

# Deploys to the EC2 app server over SSH and reloads PM2. Mirrors the WOW
# Content Automation deploy pattern. Triggered manually or on main.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'web/**'
      - 'migrations/**'
      - 'infra/**'

concurrency:
  group: deploy-wow-artwork-engine
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/wow-artwork-engine
            git fetch --all
            git reset --hard origin/main
            cd server && npm ci --omit=dev
            npm run migrate
            cd ../web && npm ci && npm run build
            cd ..
            pm2 startOrReload infra/pm2/ecosystem.config.cjs --env production
            pm2 save
